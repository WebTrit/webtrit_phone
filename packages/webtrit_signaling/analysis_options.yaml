include: package:lints/recommended.yaml

linter:
  rules:
    prefer_single_quotes: true

analyzer:
  exclude:
    - "**/*.g.dart"
  errors:
    # TODO: remove this suppression and strip the spurious `@override`
    # annotations from factory constructors in
    # lib/src/events/call/notify_event.dart and
    # lib/src/events/global/global_event.dart.
    # Disabled here because the warning is pre-existing on develop and
    # would block the pre-push analyze hook after the Flutter 3.44 upgrade.
    invalid_annotation_target: ignore

formatter:
  page_width: 120
