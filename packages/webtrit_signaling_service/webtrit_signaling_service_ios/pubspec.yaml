name: webtrit_signaling_service_ios
description: iOS implementation of the webtrit_signaling_service plugin.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: '>=3.32.0'

flutter:
  plugin:
    implements: webtrit_signaling_service
    platforms:
      ios:
        dartPluginClass: WebtritSignalingServiceIos

dependencies:
  flutter:
    sdk: flutter
  webtrit_signaling_service_platform_interface:
    path: ../webtrit_signaling_service_platform_interface
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  webtrit_signaling:
    path: ../../webtrit_signaling
