import org.jetbrains.kotlin.gradle.dsl.JvmTarget

group 'com.webtrit.signaling_service'
version '1.0-SNAPSHOT'

def flutterSdkPath = null
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    def localProperties = new Properties()
    localPropertiesFile.withInputStream { localProperties.load(it) }
    flutterSdkPath = localProperties.getProperty("flutter.sdk")
}

buildscript {
    ext.kotlin_version = '2.2.21'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    compileSdkVersion 36
    namespace 'com.webtrit.signaling_service'

    defaultConfig {
        minSdkVersion 26
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
}

kotlin {
    compilerOptions {
        jvmTarget.set(JvmTarget.JVM_17)
    }
}

dependencies {
    implementation "androidx.core:core-ktx:1.16.0"

    if (flutterSdkPath) {
        compileOnly files("$flutterSdkPath/bin/cache/artifacts/engine/android-x86/flutter.jar")
        testRuntimeOnly files("$flutterSdkPath/bin/cache/artifacts/engine/android-x86/flutter.jar")
    }

    testImplementation "junit:junit:4.13.2"
    testImplementation "org.jetbrains.kotlin:kotlin-test"
}
