name: webtrit_signaling_service_android
description: Android implementation of the webtrit_signaling_service plugin.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: '>=3.32.0'

flutter:
  plugin:
    implements: webtrit_signaling_service
    platforms:
      android:
        package: com.webtrit.signaling_service
        pluginClass: WebtritSignalingServicePlugin
        dartPluginClass: WebtritSignalingServiceAndroid

dependencies:
  flutter:
    sdk: flutter
  logging: ^1.3.0
  connectivity_plus: ^7.0.0
  webtrit_signaling:
    path: ../../webtrit_signaling
  webtrit_signaling_service_platform_interface:
    path: ../webtrit_signaling_service_platform_interface
  ssl_certificates:
    path: ../../ssl_certificates

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^26.0.3
  flutter_lints: ^6.0.0
