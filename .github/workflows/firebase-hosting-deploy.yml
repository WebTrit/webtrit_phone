name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - feature/github-actions
    tags:
      - v*

env:
  FLUTTER_VERSION: 3.16.3
  FLUTTER_CHANNEL: 'stable'
  DART_VERSION: 3.2.3


