      #        uses: c-hive/gha-remove-artifacts@v1
      #        with:
      #          age: '1 days'

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'temurin' # or another distribution of your choice


