pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      exclude: "(\\.g|\\.freezed)\\.dart$"
      run: dart format --output=none --set-exit-if-changed {staged_files}

commit-msg:
  commands:
    commit-msg-check:
      run: bash tool/scripts/commit-msg-check.sh

pre-push:
  parallel: true
  commands:
    branch-name-check:
      run: bash tool/scripts/branch-name-check.sh
    analyze:
      run: flutter analyze
    test:
      run: flutter test
