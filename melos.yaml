name: webtrit_phone

packages:
  - .
  - packages/**
  - screenshots

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  # ===========================
  # Formatting
  # Usage: melos run fmt
  # ===========================

  fmt:
    description: Format all Dart code across the workspace.
    exec:
      run: dart format . --line-length 120
      concurrency: 1
    packageFilters:
      fileExists: "lib"

  fmt:check:
    description: Check formatting without making changes.
    exec:
      run: dart format . --line-length 120 --set-exit-if-changed
      concurrency: 1
    packageFilters:
      fileExists: "lib"

  # ===========================
  # Code Generation
  # Usage: melos run generate
  # ===========================

  generate:
    description: Run build_runner for packages that use code generation.
    exec:
      run: dart run build_runner build --delete-conflicting-outputs
      concurrency: 1
      failFast: true
    packageFilters:
      dependsOn: build_runner

  generate:watch:
    description: Watch and rebuild generated files on change.
    exec:
      run: dart run build_runner watch --delete-conflicting-outputs
      concurrency: 1
    packageFilters:
      dependsOn: build_runner

  generate:clean:
    description: Clean and rebuild generated files.
    exec:
      run: dart run build_runner clean
      concurrency: 1
    packageFilters:
      dependsOn: build_runner

  # ===========================
  # Testing
  # Usage: melos run test
  # ===========================

  test:
    description: Run all tests across the workspace.
    exec:
      run: flutter test
      concurrency: 1
      failFast: false
    packageFilters:
      dirExists: test

  test:unit:
    description: Run unit tests only (excludes integration_test dir).
    exec:
      run: flutter test test/
      concurrency: 1
      failFast: false
    packageFilters:
      dirExists: test

  test:coverage:
    description: Run tests with coverage report.
    exec:
      run: flutter test --coverage
      concurrency: 1
      failFast: false
    packageFilters:
      dirExists: test

  # ===========================
  # Dependencies
  # Usage: melos run get
  # ===========================

  get:
    description: Run pub get in all packages.
    exec:
      run: flutter pub get
      concurrency: 5

  upgrade:
    description: Upgrade dependencies to latest compatible versions.
    exec:
      run: flutter pub upgrade
      concurrency: 1

  upgrade:major:
    description: Upgrade dependencies including major versions.
    exec:
      run: flutter pub upgrade --major-versions
      concurrency: 1

  outdated:
    description: Show outdated dependencies for all packages.
    exec:
      run: flutter pub outdated
      concurrency: 1

  # ===========================
  # Analysis
  # Usage: melos run analyze
  # ===========================

  analyze:
    description: Run Dart analysis across the workspace.
    exec:
      run: flutter analyze
      concurrency: 1
      failFast: false
    packageFilters:
      fileExists: "lib"

  # ===========================
  # Combined
  # Usage: melos run check | melos run ci
  # ===========================

  check:
    description: Run formatting check and analysis.
    steps:
      - fmt:check
      - analyze

  ci:
    description: Full CI pipeline — get, generate, check format, analyze, test.
    steps:
      - get
      - generate
      - fmt:check
      - analyze
      - test
